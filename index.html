<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escape the Backrooms on WebGPU</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; user-select: none; -webkit-user-select: none; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        #debug-hud {
            position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); max-height: 120px;
            background: rgba(0, 0, 0, 0.85); color: #00ffcc; font-family: monospace; font-size: 11px;
            padding: 10px; border-radius: 5px; overflow-y: auto; z-index: 9999;
            border: 1px solid #00ffcc; pointer-events: none; display: none;
        }
        #boot-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-family: sans-serif; z-index: 10000;
        }
        #boot-button {
            padding: 15px 30px; font-size: 18px; background: #00ffcc; color: #000;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .err-line { color: #ff3333; font-weight: bold; }

        /* 仮想ゲームパッド UI */
        #gamepad-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; display: none; }
        .v-btn {
            position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.15);
            color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 25px;
            display: flex; justify-content: center; align-items: center;
            font-family: monospace; font-size: 12px; font-weight: bold; pointer-events: auto;
            backdrop-filter: blur(2px); WebkitBackdropFilter: blur(2px);
        }
        .v-btn:active { background: rgba(0, 255, 204, 0.4); border-color: #00ffcc; color: #00ffcc; }
        
        #v-w { left: 70px; bottom: 130px; } #v-a { left: 15px; bottom: 75px; } #v-s { left: 70px; bottom: 20px; } #v-d { left: 125px; bottom: 75px; }
        #v-click { right: 20px; bottom: 80px; width: 70px; height: 70px; border-radius: 35px; font-size: 14px; background: rgba(0,255,204,0.15); }
        #v-f { right: 105px; bottom: 90px; } #v-shift { right: 20px; bottom: 165px; background: rgba(255,50,50,0.15); } #v-ctrl { right: 85px; bottom: 25px; }
        #v-q { left: 20px; top: 20px; } #v-e { left: 80px; top: 20px; } #v-v { left: 140px; top: 20px; } #v-tab { left: 20px; top: 80px; }
        #v-i { right: 20px; top: 20px; } #v-c { right: 80px; top: 20px; } #v-enter { right: 140px; top: 20px; }
        #v-1 { left: calc(50% - 85px); bottom: 20px; } #v-2 { left: calc(50% - 25px); bottom: 20px; } #v-3 { left: calc(50% - -35px); bottom: 20px; }
    </style>
</head>
<body>
    <div id="boot-overlay">
        <h2>Escape the Backrooms on WebGPU</h2>
        <p id="boot-status">システム準備完了。Steamアセットを展開して起動します。</p>
        <button id="boot-button">STEAMログイン ＆ 起動</button>
    </div>

    <canvas id="canvas"></canvas>
    <div id="debug-hud"></div>

    <div id="gamepad-container">
        <div class="v-btn" id="v-w" data-key="KeyW">W</div><div class="v-btn" id="v-a" data-key="KeyA">A</div><div class="v-btn" id="v-s" data-key="KeyS">S</div><div class="v-btn" id="v-d" data-key="KeyD">D</div>
        <div class="v-btn" id="v-q" data-key="KeyQ">Q</div><div class="v-btn" id="v-e" data-key="KeyE">E</div><div class="v-btn" id="v-v" data-key="KeyV">V</div><div class="v-btn" id="v-tab" data-key="Tab">TAB</div>
        <div class="v-btn" id="v-click" data-key="LClick">USE</div><div class="v-btn" id="v-f" data-key="KeyF">F</div><div class="v-btn" id="v-shift" data-key="ShiftLeft">RUN</div><div class="v-btn" id="v-ctrl" data-key="ControlLeft">CTRL</div>
        <div class="v-btn" id="v-i" data-key="KeyI">INV</div><div class="v-btn" id="v-c" data-key="KeyC">CARD</div><div class="v-btn" id="v-enter" data-key="Enter">TXT</div>
        <div class="v-btn" id="v-1" data-key="Digit1">1</div><div class="v-btn" id="v-2" data-key="Digit2">2</div><div class="v-btn" id="v-3" data-key="Digit3">3</div>
    </div>

    <script type="module">
        import init, { init_emulator_core, init_opfs_filesystem, apply_fsr_upscale, boot_game_exe, inject_keyboard_input } from './pkg/escape_the_backrooms_on_webgpu.js';

        const hud = document.getElementById('debug-hud');
        function logToHUD(msg, type = 'info') {
            hud.style.display = 'block'; 
            const div = document.createElement('div');
            div.className = type === 'error' ? 'err-line' : '';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            hud.appendChild(div); hud.scrollTop = hud.scrollHeight; 
        }

        window.onerror = function(message, source, lineno, colno, error) {
            logToHUD(`CRITICAL: ${message} (${source}:${lineno})`, 'error'); return false;
        };
        window.js_report_emulator_error = (err_code, detail) => { logToHUD(navigator.user_agent ? `ERR: ${detail}` : `ERROR [${err_code}]: ${detail}`, 'error'); };

        // ハック①：GPUPipelineCache ✕ IndexedDB ✕ 5行サンプラー
        const dbRequest = indexedDB.open("WebGPUShaderCache", 1);
        dbRequest.onupgradeneeded = () => dbRequest.result.createObjectStore("shaders");
        if (window.GPUDevice) {
            const orgCreateSampler = GPUDevice.prototype.createSampler;
            GPUDevice.prototype.createSampler = function(descriptor) { return orgCreateSampler.call(this, { ...descriptor, maxAnisotropy: 16, magFilter: 'linear', minFilter: 'linear' }); };
            GPUDevice.prototype.createRenderPipelineAsync = async function(descriptor) {
                const db = dbRequest.result; const cacheKey = JSON.stringify(descriptor.vertex.module.code + (descriptor.fragment?.module.code || ""));
                const cachedBlob = await new Promise(r => { db.transaction("shaders", "readonly").objectStore("shaders").get(cacheKey).onsuccess = e => r(e.target.result); });
                if (cachedBlob) descriptor.pipelineCache = await this.createPipelineCache({ blob: cachedBlob });
                const pipeline = await GPUDevice.prototype.createRenderPipeline.call(this, descriptor);
                if (!cachedBlob && pipeline.cache) { const blob = await pipeline.cache.getBlob(); db.transaction("shaders", "readwrite").objectStore("shaders").put(blob, cacheKey); }
                return pipeline;
            };
        }

        // ハック②・③（WebRTC P2P ＆ 無音維持）
        let peerConnection = null; let dataChannel = null;
        window.initWebRTCP2P = function(targetIPv6 = null) {
            peerConnection = new RTCPeerConnection({ iceServers: [], iceTransportPolicy: 'all' });
            if (!targetIPv6) { dataChannel = peerConnection.createDataChannel("v6GameTunnel", { ordered: false }); setupDataChannel(dataChannel); }
            else { peerConnection.ondatachannel = (event) => { dataChannel = event.channel; setupDataChannel(dataChannel); }; }
        };
        function setupDataChannel(channel) { channel.onmessage = (event) => { window.inject_packet_to_emulator(new Uint8Array(event.data)); }; }
        window.js_webrtc_send_packet = (packetData) => { if (dataChannel && dataChannel.readyState === "open") dataChannel.send(packetData); };
        function startSurvivalAudioLoop() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.001; oscillator.connect(gainNode); gainNode.connect(audioCtx.destination); oscillator.start();
        }

        // ゲームパッドブリッジ
        function setupVirtualGamepad() {
            document.querySelectorAll('.v-btn').forEach(btn => {
                const keyCode = btn.getAttribute('data-key');
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); inject_keyboard_input(keyCode, true); }, { passive: false });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); inject_keyboard_input(keyCode, false); }, { passive: false });
            });
            document.getElementById('gamepad-container').style.display = 'block';
        }

        // メインシステム起動
        let opfsRoot = null;
        async function run() {
            await init(); init_emulator_core(); 
            opfsRoot = await navigator.storage.getDirectory(); init_opfs_filesystem();
            
            // ---------------------------------------------------------------------
            // PWA サービスワーカー自動バックグラウンド登録
            // ---------------------------------------------------------------------
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => logToHUD("PWAオフラインキャッシュ（0秒起動層）の同期に成功"))
                    .catch(err => console.log("SW登録省略:", err));
            }

            document.getElementById('boot-button').addEventListener('click', async () => {
                startSurvivalAudioLoop();
                const file = await opfsRoot.getFileHandle("EscapeTheBackrooms.exe", { create: true });
                const writable = await file.createWritable(); await writable.write(new Uint8Array([0x4D, 0x5A])); await writable.close();
                boot_game_exe("EscapeTheBackrooms.exe");
                setupVirtualGamepad();
                document.getElementById('boot-overlay').style.display = 'none';
                setInterval(apply_fsr_upscale, 16);
            });
        }
        run();
    </script>
</body>
</html>
