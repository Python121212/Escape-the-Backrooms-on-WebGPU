<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escape the Backrooms on WebGPU</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        #debug-hud {
            position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); max-height: 200px;
            background: rgba(0, 0, 0, 0.85); color: #00ffcc; font-family: monospace; font-size: 11px;
            padding: 10px; border-radius: 5px; overflow-y: auto; z-index: 9999;
            border: 1px solid #00ffcc; pointer-events: none; display: none;
        }
        .err-line { color: #ff3333; font-weight: bold; }
        .warn-line { color: #ffaa00; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="debug-hud"></div>

    <script type="module">
        import init, { init_emulator_core, init_opfs_filesystem } from './pkg/escape_the_backrooms_on_webgpu.js';

        const hud = document.getElementById('debug-hud');
        function logToHUD(msg, type = 'info') {
            hud.style.display = 'block'; 
            const div = document.createElement('div');
            div.className = type === 'error' ? 'err-line' : (type === 'warn' ? 'warn-line' : '');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            hud.appendChild(div);
            hud.scrollTop = hud.scrollHeight; 
        }

        window.onerror = function(message, source, lineno, colno, error) {
            logToHUD(`CRITICAL: ${message} (${source}:${lineno})`, 'error');
            return false;
        };

        window.js_report_emulator_error = (err_code, detail) => {
            const errorMatrix = {
                101: "【x86_64 翻訳エラー】未実装のx86命令を検知しました",
                102: "【メモリモデル衝突】TSO同期中にデッドロックの兆候を検知",
                201: "【Vulkan ➔ WGSL変換失敗】SPIRV-Crossが非対応のシェーダーを検出",
                301: "【IPv6直撃失敗】相手へのダイレクトルートが遮断されました（NAT壁）",
                401: "【OPFSストレージエラー】ファイルの高速I/Oに失敗しました"
            };
            const title = errorMatrix[err_code] || "【未知のエラー】";
            logToHUD(`${title} -> 詳細: ${detail}`, 'error');
        };

        // ---------------------------------------------------------------------
        // ハック①：GPUPipelineCache ✕ IndexedDB 永続化
        // ---------------------------------------------------------------------
        const dbRequest = indexedDB.open("WebGPUShaderCache", 1);
        dbRequest.onupgradeneeded = () => dbRequest.result.createObjectStore("shaders");

        if (window.GPUDevice) {
            GPUDevice.prototype.createRenderPipelineAsync = async function(descriptor) {
                const db = dbRequest.result;
                const cacheKey = JSON.stringify(descriptor.vertex.module.code + (descriptor.fragment?.module.code || ""));
                
                const cachedBlob = await new Promise(r => {
                    const tx = db.transaction("shaders", "readonly");
                    tx.objectStore("shaders").get(cacheKey).onsuccess = e => r(e.target.result);
                });

                if (cachedBlob) {
                    descriptor.pipelineCache = await this.createPipelineCache({ blob: cachedBlob });
                }
                
                this.pushErrorScope('validation');
                const pipeline = await GPUDevice.prototype.createRenderPipeline.call(this, descriptor);
                this.popErrorScope().then((error) => {
                    if (error) logToHUD(`WebGPU Pipeline ERR: ${error.message}`, 'error');
                });
                
                if (!cachedBlob && pipeline.cache) {
                    const blob = await pipeline.cache.getBlob();
                    const tx = db.transaction("shaders", "readwrite");
                    tx.objectStore("shaders").put(blob, cacheKey);
                }
                return pipeline;
            };
        }

        // ---------------------------------------------------------------------
        // ハック②：STUN/TURN完全排除 ✕ IPv6ダイレクトP2P
        // ---------------------------------------------------------------------
        let peerConnection = null;
        let dataChannel = null;

        window.initWebRTCP2P = function(targetIPv6 = null) {
            peerConnection = new RTCPeerConnection({ iceServers: [], iceTransportPolicy: 'all' });

            if (!targetIPv6) {
                dataChannel = peerConnection.createDataChannel("v6GameTunnel", { ordered: false });
                setupDataChannel(dataChannel);
            } else {
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };
            }
        };

        function setupDataChannel(channel) {
            channel.onmessage = (event) => {
                window.inject_packet_to_emulator(new Uint8Array(event.data));
            };
            channel.onerror = (err) => {
                logToHUD(`通信チャンネルエラーが発生しました`, 'error');
            };
        }

        window.js_webrtc_send_packet = (packetData) => {
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(packetData);
            }
        };

        // ---------------------------------------------------------------------
        // ハック③：MediaSession APIによる無音維持
        // ---------------------------------------------------------------------
        function startSurvivalAudioLoop() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.001; 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            if (navigator.mediaSession) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: "Escape the Backrooms P2P Tunnel",
                    artist: "WebGPU OS Core"
                });
                navigator.mediaSession.setActionHandler('play', () => {});
                navigator.mediaSession.setActionHandler('pause', () => {});
            }
        }

        // ---------------------------------------------------------------------
        // OPFS (Origin Private File System) 初期化支援ブリッジ
        // ---------------------------------------------------------------------
        async function setupOPFS() {
            try {
                // ブラウザの高速ファイルシステムのルートハンドルを取得
                const root = await navigator.storage.getDirectory();
                // Wasm側にOPFSが利用可能であることを通知
                init_opfs_filesystem();
                logToHUD("OPFS高速ストレージ基盤の接続に成功しました");
            } catch (err) {
                window.js_report_emulator_error(401, `OPFSアクセス拒否: ${err.message}`);
            }
        }

        async function run() {
            await init();
            init_emulator_core(); 
            await setupOPFS(); // OPFS起動
            document.body.addEventListener('click', () => {
                startSurvivalAudioLoop(); 
                logToHUD("システム生存オーディオループを有効化しました");
            }, { once: true });
            console.log("Escape the Backrooms on WebGPU: Ready");
        }
        run();
    </script>
</body>
</html>
