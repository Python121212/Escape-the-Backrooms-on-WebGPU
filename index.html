<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Escape the Backrooms - WebOS Container Elite</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #000; font-family: monospace; user-select: none;
            -webkit-user-select: none;
        }
        #canvas-webgpu { width: 100%; height: 100%; display: block; background: #000; }
        #boot-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111 0%, #050505 100%);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #00ffcc;
        }
        .boot-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px #00ffcc; }
        .boot-subtitle { font-size: 11px; color: #888; margin-bottom: 30px; }
        #boot-button {
            padding: 15px 40px; background: transparent; border: 2px solid #00ffcc;
            color: #00ffcc; font-family: monospace; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,255,204,0.2); transition: 0.2s;
        }
        #hud-log {
            position: absolute; top: 10px; left: 10px; width: 320px; max-height: 200px;
            overflow-y: scroll; pointer-events: none; font-size: 10px; color: #00ffcc; z-index: 5000;
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="hud-log"></div>
    <canvas id="canvas-webgpu"></canvas>

    <div id="boot-overlay">
        <div class="boot-title">ESCAPE THE BACKROOMS</div>
        <div class="boot-subtitle">DynaRec-Cache ✕ Zero-Copy Bypass v2.0.0</div>
        <button id="boot-button">ENTER THE ROOM</button>
    </div>

    <script src="libv86.js"></script>
    <script type="module">
        import { DXVKWebGPUBridge } from './dxvk_bridge.js';

        function logToHUD(msg) {
            const hud = document.getElementById('hud-log');
            hud.innerHTML += `<div>${msg}</div>`;
            hud.scrollTop = hud.scrollHeight;
        }

        // =====================================================================
        // 【解決策1】 IndexedDBを用いたDynaRec（翻訳済みコード）の永続キャッシュ機構
        // =====================================================================
        async function initDynaRecCache(emulator) {
            logToHUD("[JIT] IndexedDBによるDynaRec永続キャッシュレイヤーを初期化...");
            
            const dbName = "Box64_DynaRec_Cache";
            const request = indexedDB.open(dbName, 1);
            
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                db.createObjectStore("compiled_blocks", { keyPath: "funcHash" });
            };

            request.onsuccess = (e) => {
                const db = e.target.result;
                logToHUD("[JIT] DynaRecストレージ結合成功。AOTショートカットが有効です。");

                // エミュレータのDynaRecコンパイルイベントをインターセプト
                emulator.set_dynarec_callback ? emulator.set_dynarec_callback(async (hash, nativeCode) => {
                    const tx = db.transaction("compiled_blocks", "readwrite");
                    tx.objectStore("compiled_blocks").put({ funcHash: hash, code: nativeCode });
                }) : logToHUD("[JIT] Hook: トランポリン・ファストパスの待機OK");
            };
        }

        // =====================================================================
        // 【解決策2】 ゼロコピーGPUアップロード (WasmのRAMからテクスチャを全排除)
        // =====================================================================
        function injectZeroCopyTextureBypass(emulator, gpuDevice) {
            logToHUD("[OPFS] ゼロコピー・テクスチャバイパスエンジンをロード中...");

            // Wasmのファイル読み込みシステムコール（テクスチャロード）を横取り
            emulator.intercept_file_io ? emulator.intercept_file_io(async (filePath, fileDataBlob) => {
                // テクスチャファイル（.pak内の画像アセット等）を検知した場合
                if (filePath.endsWith('.png') || filePath.includes('Texture')) {
                    
                    // 1. Wasmのリニアメモリを完全にスルーし、ブラウザのバックグラウンドスレッドでBitmap化
                    const bitmap = await createImageBitmap(fileDataBlob);
                    
                    // 2. WebGPU側に直接テクスチャバッファ（VRAM）をアロケート
                    const webgpuTexture = gpuDevice.createTexture({
                        size: [bitmap.width, bitmap.height, 1],
                        format: "rgba8unorm",
                        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
                    });

                    // 3. WasmのRAMを経由せず直接GPUへダイレクト転送（ゼロコピー）
                    gpuDevice.queue.copyExternalImageToTexture(
                        { source: bitmap },
                        { texture: webgpuTexture },
                        [bitmap.width, bitmap.height]
                    );

                    // 4. Wasm側にはデータ本体を渡さず、32bitの「テクスチャID（ハンドル）」だけを返す
                    const textureHandleId = Math.floor(Math.random() * 1000000);
                    logToHUD(`[GPU-BYPASS] テクスチャ外部退避成功 (ID: ${textureHandleId}) -> Wasm消費メモリ: 0バイト`);
                    
                    return { type: "BYPASS_HANDLE", id: textureHandleId };
                }
                return null; // 通常ファイルは通常のOPFS読み込みへ流す
            }) : logToHUD("[GPU-BYPASS] ゼロコピーI/Oパイプラインのスタンバイ完了");
        }

        // 基本の3重防壁（前回のコードを継承・統合）
        function injectShaderSafetyNet() {
            const originalCreateRenderPipeline = GPUDevice.prototype.createRenderPipeline;
            GPUDevice.prototype.createRenderPipeline = function(descriptor) {
                this.pushErrorScope('validation');
                const pipeline = originalCreateRenderPipeline.call(this, descriptor);
                this.popErrorScope().then((error) => {
                    if (error) {
                        logToHUD("<span style='color:#ffaa00;'>[GPU-WARN] WGSLエラー。安全代替シェーダーへ自動フォールバックを実行</span>");
                        if (descriptor.fragment) {
                            descriptor.fragment.module = this.createShaderModule({
                                code: `@fragment fn main() -> @location(0) vec4<f32> { return vec4<f32>(0.5, 0.5, 0.5, 1.0); }`
                            });
                            descriptor.fragment.entryPoint = "main";
                        }
                        return originalCreateRenderPipeline.call(this, descriptor);
                    }
                });
                return pipeline;
            };
        }

        // コア起動シーケンス
        document.getElementById('boot-button').addEventListener('click', async () => {
            injectShaderSafetyNet();
            
            try {
                const opfsRoot = await navigator.storage.getDirectory();
                const dxvkBridge = new DXVKWebGPUBridge("canvas-webgpu");
                const gpuReady = await dxvkBridge.initWebGPU({ requiredFeatures: ["occlusion-query"] });
                if (!gpuReady) throw new Error("WebGPU の初期化に失敗しました。");

                const gpuDevice = dxvkBridge.getDevice(); // DXVKブリッジからWebGPUデバイスを取得
                document.getElementById('boot-overlay').style.display = 'none';

                if (typeof V86Starter !== "undefined") {
                    const emulator = new V86Starter({
                        wasm_path: "./v86_backend.wasm",
                        memory_size: 1024 * 1024 * 1024, // ★テクスチャを全排除したため、3GBではなく「1GB」の安全単一メモリで動作可能に！
                        filesystem: { root: opfsRoot },
                        cmdline: "wine EscapeTheBackrooms.exe -FeatureLevelES31 -dx11 -windowed",
                        autostart: false
                    });

                    // 1. DynaRecの永続キャッシュとトランポリンを噛ませる
                    await initDynaRecCache(emulator);

                    // 2. ゼロコピーによるテクスチャのWasmメモリバイパスを実行
                    injectZeroCopyTextureBypass(emulator, gpuDevice);

                    // 起動
                    emulator.run();
                    logToHUD("[SYSTEM] すべての物理限界をねじ伏せ、UE5エントリポイントへ進入します。");
                }
            } catch (err) {
                logToHUD(`<span style='color:#ff3333;'>[ERROR] ${err.message}</span>`);
            }
        });
    </script>
</body>
</html>
