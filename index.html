<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escape the Backrooms on WebGPU</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script type="module">
        import init, { init_emulator_core } from './pkg/escape_the_backrooms_on_webgpu.js';

        // ---------------------------------------------------------------------
        // ハック①：GPUPipelineCache ✕ IndexedDB 永続化（プチフリ完全消滅）
        // ---------------------------------------------------------------------
        const dbRequest = indexedDB.open("WebGPUShaderCache", 1);
        dbRequest.onupgradeneeded = () => dbRequest.result.createObjectStore("shaders");

        if (window.GPUDevice) {
            GPUDevice.prototype.createRenderPipelineAsync = async function(descriptor) {
                const db = dbRequest.result;
                const cacheKey = JSON.stringify(descriptor.vertex.module.code + (descriptor.fragment?.module.code || ""));
                
                const cachedBlob = await new Promise(r => {
                    const tx = db.transaction("shaders", "readonly");
                    tx.objectStore("shaders").get(cacheKey).onsuccess = e => r(e.target.result);
                });

                if (cachedBlob) {
                    descriptor.pipelineCache = await this.createPipelineCache({ blob: cachedBlob });
                }
                
                const pipeline = await GPUDevice.prototype.createRenderPipeline.call(this, descriptor);
                
                if (!cachedBlob && pipeline.cache) {
                    const blob = await pipeline.cache.getBlob();
                    const tx = db.transaction("shaders", "readwrite");
                    tx.objectStore("shaders").put(blob, cacheKey);
                }
                return pipeline;
            };
        }

        // ---------------------------------------------------------------------
        // ハック②：STUN/TURN完全排除 ✕ IPv6ダイレクトP2P
        // ---------------------------------------------------------------------
        let peerConnection = null;
        let dataChannel = null;

        window.initWebRTCP2P = function(targetIPv6 = null) {
            // ICEサーバー空っぽ固定。STUN/TURNへの無駄パケットを物理シャットアウト
            peerConnection = new RTCPeerConnection({ iceServers: [], iceTransportPolicy: 'all' });

            if (!targetIPv6) {
                dataChannel = peerConnection.createDataChannel("v6GameTunnel", { ordered: false });
                setupDataChannel(dataChannel);
            } else {
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };
            }
        };

        function setupDataChannel(channel) {
            channel.onmessage = (event) => {
                // 友達から届いた生パケットをWasmのエミュレータメモリへダイレクトインジェクション
                window.inject_packet_to_emulator(new Uint8Array(event.data));
            };
        }

        window.js_webrtc_send_packet = (packetData) => {
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(packetData); // 生パケットをIPv6の土管へストレート射出
            }
        };

        // ---------------------------------------------------------------------
        // ハック③：MediaSession APIによる無音維持（Android Dozeモード完全回避）
        // ---------------------------------------------------------------------
        function startSurvivalAudioLoop() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.001; // 人間には完全に聞こえないレベルの極小音
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            if (navigator.mediaSession) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: "Escape the Backrooms P2P Tunnel",
                    artist: "WebGPU OS Core"
                });
                // 再生状態をキープし、ブラウザのバックグラウンド通信切断を防止
                navigator.mediaSession.setActionHandler('play', () => {});
                navigator.mediaSession.setActionHandler('pause', () => {});
            }
        }

        async function run() {
            await init();
            init_emulator_core(); // 動的コンテナのJITブート
            document.body.addEventListener('click', () => {
                startSurvivalAudioLoop(); // 画面タップで生存ループ開始
            }, { once: true });
            console.log("Escape the Backrooms on WebGPU: Ready");
        }
        run();
    </script>
</body>
</html>
