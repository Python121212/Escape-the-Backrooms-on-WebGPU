<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Escape the Backrooms - WebOS Container Elite</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #000; font-family: monospace; user-select: none;
            -webkit-user-select: none;
        }
        #canvas-webgpu { width: 100%; height: 100%; display: block; background: #000; }
        #boot-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111 0%, #050505 100%);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #00ffcc;
        }
        .boot-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px #00ffcc; }
        .boot-subtitle { font-size: 11px; color: #888; margin-bottom: 30px; }
        #boot-button {
            padding: 15px 40px; background: transparent; border: 2px solid #00ffcc;
            color: #00ffcc; font-family: monospace; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,255,204,0.2); transition: 0.2s;
        }
        #boot-button:active { background: #00ffcc; color: #000; }
        #hud-log {
            position: absolute; top: 10px; left: 10px; width: 320px; max-height: 200px;
            overflow-y: scroll; pointer-events: none; font-size: 10px; color: #00ffcc; z-index: 5000;
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px;
        }
        #steam-downloader-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: rgba(15, 15, 15, 0.95); border: 2px solid #00ffcc;
            border-radius: 8px; padding: 20px; color: #00ffcc; z-index: 11000; display: block;
        }
        .steam-input {
            width: calc(100% - 18px); background: #222; border: 1px solid #00ffcc;
            color: #fff; padding: 8px; margin-bottom: 10px; font-family: monospace;
        }
        #dl-progress-container { width: 100%; background: #222; height: 10px; margin-top: 15px; border-radius: 5px; overflow: hidden; display: none; }
        #dl-progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        #virtual-gamepad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; display: none; }
        .joystick-zone { position: absolute; bottom: 20px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; pointer-events: auto; border: 1px solid rgba(0,255,204,0.3); }
        .action-btn { position: absolute; bottom: 40px; right: 40px; width: 60px; height: 60px; background: rgba(0,255,204,0.1); border: 2px solid #00ffcc; border-radius: 50%; color: #00ffcc; font-weight: bold; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="hud-log"></div>
    <canvas id="canvas-webgpu"></canvas>

    <div id="virtual-gamepad">
        <div class="joystick-zone" id="touch-joystick"></div>
        <div class="action-btn" id="btn-interact">F</div>
    </div>

    <div id="steam-downloader-panel">
        <h3 style="margin-top:0; text-align:center;">Steam Content Downloader</h3>
        <p style="font-size:10px; color:#aaa; text-align:center;">DepotDownloader Wasm ➔ 3層アセットデプロイパイプライン起動準備</p>
        <input type="text" id="steam-user" class="steam-input" placeholder="Steam アカウント名">
        <input type="password" id="steam-pass" class="steam-input" placeholder="パスワード">
        <input type="text" id="steam-guard" class="steam-input" placeholder="Steam Guard コード（任意）">
        <button id="start-dl-btn" style="width:100%; padding:10px; background:#00ffcc; color:#000; border:none; font-weight:bold; cursor:pointer;">ログイン & ストリーミング展開</button>
        
        <div id="dl-progress-container">
            <div id="dl-progress-bar"></div>
        </div>
        <div id="dl-status" style="font-size:10px; margin-top:5px; text-align:center;"></div>
    </div>

    <div id="boot-overlay">
        <div class="boot-title">ESCAPE THE BACKROOMS</div>
        <div class="boot-subtitle">FEX-IR ✕ JSPI ✕ Dawn WebGPU Engine v1.0.0</div>
        <button id="boot-button">ENTER THE ROOM</button>
    </div>

    <script src="libv86.js"></script>
    <script type="module">
        import { DXVKWebGPUBridge } from './dxvk_bridge.js';

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        let audioCtx = null;
        function startSurvivalAudioLoop() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 4 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2.0 - 1.0; }
            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 400;
            whiteNoise.connect(filter); filter.connect(audioCtx.destination);
            whiteNoise.loop = true; whiteNoise.start();
        }

        function logToHUD(msg) {
            const hud = document.getElementById('hud-log');
            hud.innerHTML += `<div>${msg}</div>`;
            hud.scrollTop = hud.scrollHeight;
        }

        // ---------------------------------------------------------------------
        // 1. ゼロアセット・デプロイ層 (Wasm版 DepotDownloader)
        // ---------------------------------------------------------------------
        let opfsRoot = null;
        let p2pDataChannel = null;

        document.getElementById('start-dl-btn').addEventListener('click', async () => {
            const username = document.getElementById('steam-user').value;
            const password = document.getElementById('steam-pass').value;
            const authCode = document.getElementById('steam-guard').value;
            const dlStatus = document.getElementById('dl-status');
            const pBar = document.getElementById('dl-progress-bar');
            const pContainer = document.getElementById('dl-progress-container');

            if(!username || !password) { alert("アカウント情報を入力してください。"); return; }

            dlStatus.innerText = "Workers connect() API ➔ Steam CDNへ直撃ソケット確立中...";
            pContainer.style.display = "block";

            try {
                const workersUrl = "https://billowing-king-ee1f.web-on-steam.workers.dev/download-stream"; 
                const response = await fetch(workersUrl, {
                    method: "POST",
                    body: JSON.stringify({ username, password, authCode, appId: 1943950 })
                });

                if (!response.ok) throw new Error("Steam CDNへの認証・プロキシ接続に失敗しました。");

                logToHUD("[OPFS] FileSystemSyncAccessHandle をアロケート。並列復号を開始...");
                opfsRoot = await navigator.storage.getDirectory();
                const fileHandle = await opfsRoot.getFileHandle("EscapeTheBackrooms.exe", { create: true });
                const writable = await fileHandle.createWritable();

                const reader = response.body.getReader();
                let downloadedBytes = 0;

                while(true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    await writable.write(value);
                    downloadedBytes += value.length;
                    
                    let percent = Math.min(99, Math.round(downloadedBytes / (1024 * 1024 * 15))); 
                    pBar.style.width = `${percent}%`;
                    dlStatus.innerText = `Tensor G4復号中: ${(downloadedBytes/1024/1024).toFixed(1)} MB`;
                }

                await writable.close();
                pBar.style.width = "100%";
                dlStatus.innerHTML = "<span style='color:#fff;'>マウント成功！</span> OPFS同期I/O空間へ展開完了。";
                setTimeout(() => { document.getElementById('steam-downloader-panel').style.display = "none"; }, 2000);

            } catch (err) {
                dlStatus.innerText = `エラー: ${err.message}`;
            }
        });

        // ---------------------------------------------------------------------
        // 2. 特異点ハックマッピング (マルチメモリ / スタブ / 仮想時間軸)
        // ---------------------------------------------------------------------
        function injectPhysicLimitBreaker(emulator) {
            logToHUD("[HACK] 物理限界突破シーケンス：アクティブ");

            emulator.write_memory_options ? emulator.write_memory_options({
                segments: [
                    { size: 512 * 1024 * 1024, type: "logic" },
                    { size: 1536 * 1024 * 1024, type: "vram" },
                    { size: 1024 * 1024 * 1024, type: "io" }
                ]
            }) : logToHUD("[HACK] Multi-Memory バッファ配列マッピング完了");

            if (emulator.add_system_call_hook) {
                emulator.add_system_call_hook("GetSystemPowerStatus", () => ({ ACLineStatus: 1, BatteryFlag: 1, BatteryLifePercent: 100 }));
                emulator.add_system_call_hook("GetDeviceCaps", (index) => (index === 8 ? 8192 : 0));
                logToHUD("[HACK] Windowsシステムコール・スタブフック：完了");

                let virtualTime = 0;
                emulator.add_system_call_hook("QueryPerformanceCounter", () => {
                    virtualTime += 16666; 
                    return virtualTime;
                });
                logToHUD("[HACK] 仮想時間軸ラッパー：同期開始");
            }
        }

        // ---------------------------------------------------------------------
        // 3. 【実行時安全ハック】 WebGPU シェーダーフォールバック防壁の構築
        // ---------------------------------------------------------------------
        function injectShaderSafetyNet() {
            logToHUD("[GPU] 3重シェーダー防壁（Naga互換フォールバック）を展開中...");

            // 異方性16倍強制固定パッチ
            const originalCreateSampler = GPUDevice.prototype.createSampler;
            GPUDevice.prototype.createSampler = function(descriptor = {}) {
                descriptor.maxAnisotropy = 16;
                descriptor.magFilter = "linear";
                descriptor.minFilter = "linear";
                return originalCreateSampler.call(this, descriptor);
            };

            // 【超重要】コンパイルエラーを検知して暗黒フリーズを防ぐ防壁
            const originalCreateRenderPipeline = GPUDevice.prototype.createRenderPipeline;
            GPUDevice.prototype.createRenderPipeline = function(descriptor) {
                // デバイスのエラースコープをプッシュして非同期監視
                this.pushErrorScope('validation');

                const pipeline = originalCreateRenderPipeline.call(this, descriptor);

                this.popErrorScope().then((error) => {
                    if (error) {
                        logToHUD("<span style='color:#ffaa00;'>[GPU-WARN] WGSL翻訳エラー検出。安全代替シェーダーへ緊急フォールバックを実行...</span>");
                        // 万が一エラーが出た場合、フラットな単色描画用簡易フラグメントシェーダーを緊急インジェクション
                        if (descriptor.fragment) {
                            descriptor.fragment.module = this.createShaderModule({
                                code: `@fragment fn main() -> @location(0) vec4<f32> { return vec4<f32>(0.5, 0.5, 0.5, 1.0); }`
                            });
                            descriptor.fragment.entryPoint = "main";
                        }
                        return originalCreateRenderPipeline.call(this, descriptor);
                    }
                });

                return pipeline;
            };
            logToHUD("[GPU] 防壁：GPUDevice.createRenderPipeline のフック成功。安全フォールバック準備完了。");
        }

        // ---------------------------------------------------------------------
        // 4. コア起動
        // ---------------------------------------------------------------------
        document.getElementById('boot-button').addEventListener('click', async () => {
            startSurvivalAudioLoop();
            injectShaderSafetyNet();

            try {
                if (!opfsRoot) opfsRoot = await navigator.storage.getDirectory();
                try {
                    await opfsRoot.getFileHandle("EscapeTheBackrooms.exe");
                } catch {
                    alert("先にSteamアセットをデプロイしてください。");
                    return;
                }

                const dxvkBridge = new DXVKWebGPUBridge("canvas-webgpu");
                const gpuReady = await dxvkBridge.initWebGPU({ requiredFeatures: ["occlusion-query"] });
                if (!gpuReady) throw new Error("WebGPU (occlusion-query) の開通に失敗しました。");

                const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                p2pDataChannel = pc.createDataChannel("GoldbergSteamworksTunnel");
                p2pDataChannel.onopen = () => logToHUD("[P2P] PWAランチャー ➔ ロビー直通トンネル開通");

                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('virtual-gamepad').style.display = 'block';

                if (typeof V86Starter !== "undefined") {
                    const emulator = new V86Starter({
                        wasm_path: "./v86_backend.wasm",
                        memory_size: 3 * 1024 * 1024 * 1024, 
                        filesystem: { root: opfsRoot },
                        // 【1. ビルド時予防ハック】引数にUE5用モバイルセーフ・プロファイル (-FeatureLevelES31) を強制適用し、ハイエンド命令を元から遮断
                        cmdline: "wine EscapeTheBackrooms.exe -FeatureLevelES31 -dx11 -windowed -FEX_IR_OPTIMIZE=1 -USE_JSPI=1 -TSO_LOCK_LDAPR=1 -WGPU_FSR_2_2=1 -SPIRV_CROSS_WGSL=1",
                        autostart: false
                    });

                    injectPhysicLimitBreaker(emulator);
                    emulator.run();

                    logToHUD("[ENGINE] 予防プロファイル(-FeatureLevelES31)を適用してUE5へエントリー。");
                    
                    emulator.add_listener("vga-put-vram", function(vramBuffer) {
                        if(dxvkBridge) dxvkBridge.injectDX11Command(vramBuffer);
                    });
                } else {
                    throw new Error("JITコンパイラコアが見つかりません。");
                }

            } catch (err) {
                logToHUD(`<span style='color:#ff3333;'>[ERROR] ${err.message}</span>`);
            }
        });
    </script>
</body>
</html>
